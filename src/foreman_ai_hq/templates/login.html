<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Foreman AI HQ</title>
  <style>
    :root {
      --bg-0: #0b0f12;
      --bg-1: #11171c;
      --bg-2: #161e25;
      --bg-3: #1d2730;
      --line: #243038;
      --line-2: #2d3b46;
      --fg-0: #e6edf3;
      --fg-1: #b3bec8;
      --fg-2: #7d8a96;
      --fg-3: #4f5b66;
      --accent: #5cf2c4;
      --accent-dim: #2a8d72;
      --danger: #f25c5c;
      --sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
      --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; background: var(--bg-0); color: var(--fg-0); font-family: var(--sans); font-size: 14px; line-height: 1.5; }
    /* Matches base.html's footer. The board's striped synthetic-data warning
       treatment is reserved for fabricated data and is not reused for branding. */
    footer { padding: 12px 20px; border-top: 1px solid var(--line); font-family: var(--mono); font-size: 11px; color: var(--fg-3); text-align: center; }
    .centered { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: calc(100vh - 40px); padding: 24px; }
    .brand { font-family: var(--mono); font-weight: 700; letter-spacing: 0.16em; color: var(--accent); text-transform: uppercase; margin-bottom: 24px; }
    .brand .dot { color: var(--fg-3); margin: 0 6px; }
    .panel { background: var(--bg-1); border: 1px solid var(--line); border-radius: 6px; width: 100%; max-width: 520px; overflow: hidden; }
    .panel-header { padding: 12px 16px; background: var(--bg-2); border-bottom: 1px solid var(--line); }
    .panel-header h3 { margin: 0; font-size: 13px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-1); }
    .panel-body { padding: 16px; }
    .page-title { font-size: 20px; font-weight: 600; margin: 0 0 4px; letter-spacing: -0.01em; }
    .page-sub { font-family: var(--mono); font-size: 12px; color: var(--fg-2); margin: 0 0 24px; }
    .muted { color: var(--fg-2); }
    .error { border-left: 3px solid var(--danger); background: rgba(242,92,92,0.08); padding: 10px 12px; border-radius: 4px; margin: 0 0 16px; color: var(--fg-0); }
    label { display: block; font-size: 12px; color: var(--fg-2); margin-bottom: 6px; }
    input { width: 100%; background: var(--bg-0); border: 1px solid var(--line-2); border-radius: 4px; color: var(--fg-0); font-family: var(--mono); font-size: 13px; padding: 8px 10px; }
    input:focus { outline: none; border-color: var(--accent); }
    button { display: inline-block; background: var(--accent-dim); border: 1px solid var(--accent); color: var(--bg-0); padding: 8px 14px; border-radius: 4px; font-family: var(--mono); font-size: 12px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
    button:hover { background: var(--accent); }
    .mt-12 { margin-top: 12px; }
  </style>
</head>
<body>
  <div class="centered">
    <div class="brand">Foreman AI HQ<span class="dot">·</span><span style="color:var(--fg-1)">Portal</span></div>
    <div class="panel">
      <div class="panel-header"><h3>Open portal</h3></div>
      <div class="panel-body">
        <h1 class="page-title">Operator login</h1>
        <p class="page-sub">portal token · signed cookie · operator-only controls</p>
        <p class="muted">Enter token from <code>TOKEN_TRACKER_PORTAL_TOKEN</code>.</p>
        {% if error %}<div class="error" role="alert">{{ error }}</div>{% endif %}
        <form action="/login" method="post">
          <label for="token">Portal token</label>
          <input id="token" name="token" type="password" required autofocus>
          <div class="mt-12"><button type="submit">Open portal</button></div>
        </form>
      </div>
    </div>
  </div>
  <footer>Foreman AI HQ portal · operator-controlled budget governance</footer>
</body>
</html>
