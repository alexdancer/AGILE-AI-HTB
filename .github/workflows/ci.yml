name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-build-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Run tests
        run: uv run --extra test pytest -q

      - name: Build package
        run: uv build

      - name: Check package metadata
        run: uvx twine check dist/*

      - name: Run disposable pipx install smoke
        run: |
          python -m pip install --user pipx
          PATH="$HOME/.local/bin:$PATH" sh scripts/pipx-install-smoke.sh
