name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-build-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      # The default pytest run includes tests/e2e, which builds the React shell
      # and drives Chromium. Node and a browser binary are therefore required.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('uv.lock') }}
          restore-keys: ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium
        run: uv run --extra test playwright install --with-deps chromium

      - name: Run tests
        run: uv run --extra test pytest -q

      - name: Build package
        run: uv build

      - name: Check package metadata
        run: uvx twine check dist/*

      - name: Run disposable pipx install smoke
        run: |
          python -m pip install --user pipx
          PATH="$HOME/.local/bin:$PATH" sh scripts/pipx-install-smoke.sh
