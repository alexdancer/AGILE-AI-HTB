services:
  agile-ai-htb:
    build: .
    image: agile-ai-htb:local
    container_name: agile-ai-htb
    ports:
      - "8000:8000"
    environment:
      - TOKEN_TRACKER_DATABASE_PATH=/data/harness.db
      - TOKEN_TRACKER_GUARDRAILS_PATH=/app/guardrails.yaml
      - TOKEN_TRACKER_PORTAL_TOKEN=${TOKEN_TRACKER_PORTAL_TOKEN:-DEMO_PORTAL_TOKEN_2099}
      - AGILE_AI_HTB_CONTROL_PROVIDER=${AGILE_AI_HTB_CONTROL_PROVIDER:-openai}
      - AGILE_AI_HTB_CONTROL_MODEL=${AGILE_AI_HTB_CONTROL_MODEL:-gpt-5.4}
      - AGILE_AI_HTB_CONTROL_BASE_URL=${AGILE_AI_HTB_CONTROL_BASE_URL:-}
      - AGILE_AI_HTB_CONTROL_API_KEY_ENV=${AGILE_AI_HTB_CONTROL_API_KEY_ENV:-AGILE_AI_HTB_CONTROL_API_KEY}
      - AGILE_AI_HTB_CONTROL_API_KEY=${AGILE_AI_HTB_CONTROL_API_KEY:-}
    volumes:
      - agile-ai-htb-data:/data
      - ./guardrails.yaml:/app/guardrails.yaml:ro
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  agile-ai-htb-data:
