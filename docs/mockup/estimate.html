<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AGILE-AI-HTB — Estimate Task</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="demo-banner">DEMO — synthetic data, not a live system · all values fabricated</div>
  <div class="shell">
    <header class="topbar"></header>
    <aside class="sidebar"></aside>
    <main class="main">
      <h1 class="page-title">Estimate Task</h1>
      <p class="page-sub">predict token cost + recommended model, clamped to current budget zone</p>

      <div class="grid cols-2">
        <section class="panel">
          <div class="panel-header"><h3>New estimate</h3></div>
          <div class="panel-body">
            <form id="estimate-form">
              <label for="desc">Task description</label>
              <textarea id="desc" placeholder="e.g. refactor auth module to use dependency-injected validators" required></textarea>

              <div class="grid cols-2" style="gap:12px;margin-top:12px">
                <div>
                  <label for="remaining">Remaining daily tokens</label>
                  <input id="remaining" type="number" value="387600" />
                </div>
                <div>
                  <label for="cap">Daily cap tokens</label>
                  <input id="cap" type="number" value="1000000" />
                </div>
              </div>

              <div class="btn-row" style="margin-top:16px">
                <button class="btn primary" type="submit">Estimate</button>
                <button class="btn ghost" type="button" id="reset-btn">Reset</button>
              </div>
            </form>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header"><h3>Result</h3></div>
          <div class="panel-body" id="result">
            <div class="muted">Submit the form to see the estimate.</div>
          </div>
        </section>
      </div>

      <section class="panel">
        <div class="panel-header"><h3>Sample estimates</h3></div>
        <div class="panel-body tight">
          <table>
            <thead>
              <tr>
                <th>description</th>
                <th class="right">tokens</th>
                <th>complexity</th>
                <th>model</th>
                <th>budget note</th>
              </tr>
            </thead>
            <tbody id="samples"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <footer></footer>

  <script src="js/fixtures.js"></script>
  <script src="js/app.js"></script>
  <script>
    (function () {
      const F = AGILE_AI_HTB.fixtures;
      const { fmt, renderShell } = AGILE_AI_HTB.app;
      renderShell("Estimate Task");

      // Mock classifier — mirrors the rule in estimation.py (simple/modest/complex)
      function classify(text) {
        const n = text.trim().split(/\s+/).length;
        if (n < 8) return { complexity: "simple", tokens: 5_000,  model: "gpt-4o-mini" };
        if (n < 25) return { complexity: "modest",  tokens: 25_000, model: "gpt-4o-mini" };
        return { complexity: "complex", tokens: 100_000, model: "gpt-4o" };
      }

      function renderResult(est, remaining, cap) {
        const used = cap - remaining;
        const ratio = used / cap;
        const threshold = 0.60;
        let budgetNote = est.budget_note || null;
        if (!budgetNote && ratio >= threshold && est.model !== "gpt-4o-mini") {
          budgetNote = `Budget low — recommended model clamped from ${est.model} to gpt-4o-mini`;
        }
        const zone = ratio < 0.40 ? "green" : ratio < 0.75 ? "yellow" : "red";
        const zoneCls = zone === "green" ? "green" : zone === "yellow" ? "yellow" : "red";
        return `
          <div class="kv">
            <div class="k">complexity</div><div class="v">${est.complexity}</div>
            <div class="k">token_estimate</div><div class="v">${fmt(est.tokens)}</div>
            <div class="k">recommended_model</div><div class="v">${est.model}</div>
            <div class="k">current_zone</div><div class="v"><span class="pill ${zoneCls}">${zone}</span></div>
            <div class="k">budget_note</div><div class="v">${budgetNote || '<span class="muted">—</span>'}</div>
          </div>`;
      }

      document.getElementById("estimate-form").addEventListener("submit", (ev) => {
        ev.preventDefault();
        const desc = document.getElementById("desc").value;
        const remaining = Number(document.getElementById("remaining").value);
        const cap = Number(document.getElementById("cap").value);
        const est = classify(desc);
        document.getElementById("result").innerHTML = renderResult(
          { ...est, budget_note: null }, remaining, cap
        );
      });

      document.getElementById("reset-btn").addEventListener("click", () => {
        document.getElementById("estimate-form").reset();
        document.getElementById("result").innerHTML = '<div class="muted">Submit the form to see the estimate.</div>';
      });

      document.getElementById("samples").innerHTML = F.estimateSamples.map(s => `
        <tr>
          <td>${s.description}</td>
          <td class="mono right">${fmt(s.token_estimate)}</td>
          <td><span class="pill ${s.complexity === 'simple' ? 'green' : s.complexity === 'modest' ? 'yellow' : 'red'}">${s.complexity}</span></td>
          <td class="mono">${s.recommended_model}</td>
          <td class="muted">${s.budget_note || '—'}</td>
        </tr>`).join("");
    })();
  </script>
</body>
</html>
