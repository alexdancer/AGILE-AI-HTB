<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AGILE-AI-HTB — Sessions</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="demo-banner">DEMO — synthetic data, not a live system · all values fabricated</div>
  <div class="shell">
    <header class="topbar"></header>
    <aside class="sidebar"></aside>
    <main class="main">
      <h1 class="page-title">Sessions</h1>
      <p class="page-sub">all sessions · click a row for token usage timeline + checkpoints</p>

      <section class="panel">
        <div class="panel-header"><h3>All sessions</h3></div>
        <div class="panel-body tight">
          <table>
            <thead>
              <tr>
                <th>session</th>
                <th>task</th>
                <th>model</th>
                <th>status</th>
                <th class="right">prompt</th>
                <th class="right">completion</th>
                <th class="right">total</th>
                <th>zone</th>
                <th>alarms</th>
              </tr>
            </thead>
            <tbody id="sessions-table"></tbody>
          </table>
        </div>
      </section>

      <div id="session-details"></div>
    </main>
  </div>
  <footer></footer>

  <script src="js/fixtures.js"></script>
  <script src="js/app.js"></script>
  <script>
    (function () {
      const F = AGILE_AI_HTB.fixtures;
      const { fmt, zonePill, statusPill, renderShell } = AGILE_AI_HTB.app;
      renderShell("Sessions");

      document.getElementById("sessions-table").innerHTML = F.sessions.map(s => `
        <tr class="row-link" onclick="document.getElementById('det-${s.session.id}').scrollIntoView({behavior:'smooth'})">
          <td class="mono muted">${s.session.id}</td>
          <td>${s.session.task_description}</td>
          <td class="mono">${s.session.model}</td>
          <td>${statusPill(s.session.status)}</td>
          <td class="mono right">${fmt(s.token_totals.prompt_tokens)}</td>
          <td class="mono right">${fmt(s.token_totals.completion_tokens)}</td>
          <td class="mono right">${fmt(s.token_totals.total_tokens)}</td>
          <td>${zonePill(s.current_zone)}</td>
          <td><span class="pill ${s.alarms.length ? 'red' : 'muted'}">${s.alarms.length}</span></td>
        </tr>`).join("");

      // Per-session detail panels
      const out = F.sessions.map(s => {
        const max = Math.max(...F.sessions.map(x => x.token_totals.total_tokens));
        const totalBar = (s.token_totals.total_tokens / max) * 100;
        const promptPct = (s.token_totals.prompt_tokens / s.token_totals.total_tokens) * 100;
        return `
          <section class="panel" id="det-${s.session.id}">
            <div class="session-head">
              <div>
                <div class="id">${s.session.id}</div>
                <div class="meta">${s.session.task_description} · model=${s.session.model} · started ${s.session.started_at}</div>
              </div>
              <div class="flex">
                ${statusPill(s.session.status)}
                ${zonePill(s.current_zone)}
              </div>
            </div>
            <div class="panel-body">
              <div class="grid cols-2">
                <div>
                  <h4 class="muted mono" style="font-size:11px;text-transform:uppercase;letter-spacing:0.08em;margin:0 0 8px">Token totals</h4>
                  <div class="kv">
                    <div class="k">prompt_tokens</div><div class="v">${fmt(s.token_totals.prompt_tokens)}</div>
                    <div class="k">completion_tokens</div><div class="v">${fmt(s.token_totals.completion_tokens)}</div>
                    <div class="k">total_tokens</div><div class="v">${fmt(s.token_totals.total_tokens)}</div>
                  </div>
                  <div class="bar" style="height:8px;background:var(--bg-3);border-radius:4px;margin-top:12px;position:relative;overflow:hidden">
                    <span style="display:block;position:absolute;left:0;top:0;height:100%;width:${promptPct}%;background:var(--info);opacity:0.6"></span>
                    <span style="display:block;position:absolute;left:0;top:0;height:100%;width:${totalBar}%;background:var(--accent);opacity:0.5"></span>
                  </div>
                  <div class="muted mono" style="font-size:10px;margin-top:4px">prompt (blue) · total share of max session (green)</div>
                </div>
                <div>
                  <h4 class="muted mono" style="font-size:11px;text-transform:uppercase;letter-spacing:0.08em;margin:0 0 8px">Checkpoints</h4>
                  <table>
                    <thead><tr><th>name</th><th>status</th><th>detail</th></tr></thead>
                    <tbody>
                      ${s.checkpoints.map(c => `
                        <tr>
                          <td class="mono">${c.name}</td>
                          <td>${statusPill(c.status === "ok" ? "completed" : c.status === "warn" ? "paused" : "blocked")}</td>
                          <td class="muted mono">${c.detail}</td>
                        </tr>`).join("")}
                    </tbody>
                  </table>
                </div>
              </div>

              <h4 class="muted mono" style="font-size:11px;text-transform:uppercase;letter-spacing:0.08em;margin:20px 0 8px">Tool breakdown</h4>
              <div class="grid cols-3">
                ${Object.entries(s.tool_breakdown).map(([t, v]) => `
                  <div class="kpi">
                    <div class="label">${t}</div>
                    <div class="value mono">${v.calls}</div>
                    <div class="sub">calls</div>
                  </div>`).join("")}
              </div>
            </div>
          </section>`;
      }).join("");
      document.getElementById("session-details").innerHTML = out;
    })();
  </script>
</body>
</html>
