<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AGILE-AI-HTB — Dashboard</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="demo-banner">DEMO — synthetic data, not a live system · all values fabricated</div>
  <div class="shell">
    <header class="topbar"></header>
    <aside class="sidebar"></aside>
    <main class="main">
      <h1 class="page-title">Dashboard</h1>
      <p class="page-sub">overview · daily budget · active sessions · recent alarms</p>

      <!-- KPI strip -->
      <section class="grid cols-4" id="kpi-strip"></section>

      <!-- Active sessions table -->
      <section class="panel">
        <div class="panel-header">
          <h3>Active sessions</h3>
          <a href="sessions.html" class="muted mono" style="font-size:12px">view all →</a>
        </div>
        <div class="panel-body tight">
          <table>
            <thead>
              <tr>
                <th>session</th>
                <th>task</th>
                <th>model</th>
                <th>tokens</th>
                <th>zone</th>
                <th>alarms</th>
              </tr>
            </thead>
            <tbody id="active-sessions"></tbody>
          </table>
        </div>
      </section>

      <!-- Recent alarms -->
      <section class="panel">
        <div class="panel-header">
          <h3>Recent alarms</h3>
          <a href="alarms.html" class="muted mono" style="font-size:12px">view all →</a>
        </div>
        <div class="panel-body" id="recent-alarms"></div>
      </section>
    </main>
  </div>
  <footer></footer>

  <script src="js/fixtures.js"></script>
  <script src="js/app.js"></script>
  <script>
    (function () {
      const F = AGILE_AI_HTB.fixtures;
      const { fmt, pct, zonePill, sevPill, renderShell } = AGILE_AI_HTB.app;
      renderShell("Dashboard");

      // KPIs
      const active = F.sessions.filter(s => s.session.status === "active");
      const openAlarms = F.alarms.filter(a => !a.resolved);
      const critical = openAlarms.filter(a => a.severity === "critical");
      const totalTokens = F.sessions.reduce((a, s) => a + s.token_totals.total_tokens, 0);
      document.getElementById("kpi-strip").innerHTML = `
        <div class="kpi">
          <div class="label">Daily cap</div>
          <div class="value mono">${fmt(F.meta.daily_used_tokens)} / ${fmt(F.meta.daily_cap_tokens)}</div>
          <div class="sub">${pct(F.meta.daily_used_tokens, F.meta.daily_cap_tokens)} used</div>
          <div class="bar"><span style="width:${pct(F.meta.daily_used_tokens, F.meta.daily_cap_tokens)}"></span></div>
        </div>
        <div class="kpi">
          <div class="label">Active sessions</div>
          <div class="value mono">${active.length}</div>
          <div class="sub">${F.sessions.length} total today</div>
        </div>
        <div class="kpi">
          <div class="label">Open alarms</div>
          <div class="value mono">${openAlarms.length}</div>
          <div class="sub">${critical.length} critical</div>
        </div>
        <div class="kpi">
          <div class="label">Tokens used</div>
          <div class="value mono">${fmt(totalTokens)}</div>
          <div class="sub">across ${F.sessions.length} sessions</div>
        </div>`;

      // Active sessions table
      document.getElementById("active-sessions").innerHTML = active.map(s => `
        <tr class="row-link" onclick="location.href='sessions.html#${s.session.id}'">
          <td class="mono muted">${s.session.id}</td>
          <td>${s.session.task_description}</td>
          <td class="mono">${s.session.model}</td>
          <td class="mono right">${fmt(s.token_totals.total_tokens)}</td>
          <td>${zonePill(s.current_zone)}</td>
          <td><span class="pill ${s.alarms.length ? 'red' : 'muted'}">${s.alarms.length}</span></td>
        </tr>`).join("");

      // Recent alarms
      document.getElementById("recent-alarms").innerHTML = F.alarms.slice(0, 4).map(a => {
        const cls = a.severity === "critical" ? "critical" : a.severity === "warning" ? "warning" : "info";
        return `
          <div class="alarm ${cls}" id="alarm-${a.id}">
            <div class="head">
              <div class="flex">
                ${sevPill(a.severity)}
                <span class="mono">${a.type}</span>
                ${a.resolved ? '<span class="pill green">resolved</span>' : ''}
              </div>
              <div class="id mono">${a.id} · ${a.timestamp}</div>
            </div>
            <div class="body">Session <a href="sessions.html#${a.session_id}">${a.session_id}</a></div>
            <div class="reco">→ ${a.recommended_action}</div>
          </div>`;
      }).join("");
    })();
  </script>
</body>
</html>
