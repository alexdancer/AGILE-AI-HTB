# AGILE-AI-HTB — Guardrail Configuration
# These are the default guardrails. Override per-session via /session/start payload.

guardrails:
  # G1: Daily token cap across all sessions. Resets at midnight local time.
  # User sets the budget amount; the harness tracks consumption and shows "resets in Xh Ym."
  daily_cap:
    enabled: true
    budget_period: daily       # calendar day — resets at midnight local time
    tokens: 1000000             # 1M tokens/day — user-configurable
    reset_time: "00:00"         # local timezone
    action: notify              # notify when exceeded; sessions continue

  # G2: Per-session token cap. Notify when exceeded; agent continues.
  session_cap:
    enabled: true
    tokens: 200000       # 200K tokens/session
    action: notify

  # G3: Budget consumption zones. Graduated guardrail — three-layer enforcement per zone.
  zones:
    enabled: true
    green: 0.60          # 0-60%: normal operation — full tools, full max_tokens, thorough prompt
    yellow: 0.85         # 60-85%: constrained — restricted tools, halved max_tokens, concise prompt
    red: 1.0             # 85-100%: critical — delivery-only tools, quarter max_tokens, bare prompt
    enforcement:
      # Layer 1: Progressive system prompt rewrites
      system_prompt:
        green: "You have ample token budget. Be thorough: write tests, add documentation, explore alternatives."
        yellow: "Budget is limited. Prioritize the core task. Skip documentation and non-essential tests. Be concise."
        red: "Budget critical. Output only the final deliverable. No explanations, no exploration, no tests. If you cannot finish in two turns, deliver what you have."
      # Layer 2: Zone-based max_tokens limiting (agent physically cannot produce long responses)
      max_tokens:
        green: 4096       # Full
        yellow: 2048      # 50% of green
        red: 1024         # 25% of green
      # Layer 3: Zone-based tool restrictions (expensive/exploratory tools removed)
      blocked_tools:
        yellow: ["web_search", "browser_navigate", "browser_snapshot", "browser_click", "web_extract", "delegate_task", "vision_analyze", "image_generate"]
        red: ["web_search", "browser_navigate", "browser_snapshot", "browser_click", "web_extract", "delegate_task", "vision_analyze", "image_generate", "search_files", "execute_code"]

  # G4: Loop detection. Same tool + same input hash repeated N times.
  loop_detection:
    enabled: true
    threshold: 5         # fire after 5 consecutive identical calls
    action: notify       # LOOP_DETECTED alarm; agent continues

  # G5: Session wall-clock timeout.
  session_timeout:
    enabled: true
    duration: 1800        # 30 minutes in seconds
    action: notify_and_checkpoint  # SESSION_TIMEOUT alarm + save checkpoint

  # G6: Tool-category budget weighting. No single category > N% of session spend.
  tool_category_limit:
    enabled: true
    limit: 0.50          # 50% of session budget
    action: inject_context  # TOOL_CATEGORY_BIAS alarm, warn agent

# Tool categories used by G6
tool_categories:
  reasoning:             # Pure LLM turns (no tool call)
    weight: 1.0
  file_io:               # read_file, write_file, patch, search_files
    weight: 0.3
  shell:                 # terminal, process
    weight: 0.4
  web:                   # web_search, web_extract, browser_*
    weight: 0.5
  vision:                # vision_analyze, browser_vision
    weight: 0.6
  code_exec:             # execute_code
    weight: 0.8
  delegation:            # delegate_task
    weight: 1.5

# Alarm notification channels
notifications:
  discord_webhook: ""    # https://discord.com/api/webhooks/...
  slack_webhook: ""       # https://hooks.slack.com/services/...
  macos_notification: true  # Use osascript to show macOS notification

# Model routing: which model to recommend for a given task complexity
model_routing:
  task_complexity:
    simple:
      description: "Trivial tasks — single-line fix, small CSS change, typo correction"
      recommended_model: "claude-haiku"      # or "gpt-4o-mini"
    modest:
      description: "Standard tasks — add an endpoint, write tests, refactor a module"
      recommended_model: "claude-sonnet"     # or "gpt-4o"
    complex:
      description: "Hard tasks — system design, auth refactor, new feature architecture"
      recommended_model: "claude-opus"       # or "gpt-4.5"
  budget_aware_clamp:
    enabled: true
    remaining_daily_threshold: 0.15          # If <15% daily budget remains, downgrade one tier
    note: "Budget is tight — downgraded from {original} to {downgraded}."
